<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Ping command summary</title>
  <desc id="desc">Stylized terminal output showing ping statistics for Phoenix, Wikipedia, and Tokyo servers.</desc>
  <rect width="960" height="520" rx="24" fill="#0e1a2b"/>
  <rect x="24" y="24" width="912" height="472" rx="20" fill="#121f35"/>
  <g font-family="Consolas, 'Courier New', monospace" font-size="18" fill="#9ec6ff">
    <text x="56" y="86">PING phoenix.uagc.edu (198.51.100.12) 56(84) bytes of data.</text>
    <text x="56" y="116" fill="#7fffd4">64 bytes</text>
    <text x="150" y="116"> from 198.51.100.12: icmp_seq=1 ttl=54 time=31.8 ms</text>
    <text x="56" y="146" fill="#7fffd4">64 bytes</text>
    <text x="150" y="146"> from 198.51.100.12: icmp_seq=2 ttl=54 time=32.5 ms</text>
    <text x="56" y="176">--- phoenix.uagc.edu ping statistics ---</text>
    <text x="56" y="206">2 packets transmitted, 2 received, 0% packet loss, time 1002ms</text>
    <text x="56" y="236">rtt min/avg/max/mdev = 31.8/32.2/32.5/0.3 ms</text>
  </g>
  <g font-family="Consolas, 'Courier New', monospace" font-size="18" fill="#a9ff82">
    <text x="56" y="296">PING en.wikipedia.org (208.80.154.224) 56(84) bytes of data.</text>
    <text x="56" y="326" fill="#7fffd4">64 bytes</text>
    <text x="150" y="326"> from 208.80.154.224: icmp_seq=1 ttl=51 time=67.8 ms</text>
    <text x="56" y="356" fill="#7fffd4">64 bytes</text>
    <text x="150" y="356"> from 208.80.154.224: icmp_seq=2 ttl=51 time=68.4 ms</text>
    <text x="56" y="386">--- en.wikipedia.org ping statistics ---</text>
    <text x="56" y="416">2 packets transmitted, 2 received, 0% packet loss, time 1008ms</text>
    <text x="56" y="446">rtt min/avg/max/mdev = 67.8/68.1/68.4/0.3 ms</text>
  </g>
  <g font-family="Consolas, 'Courier New', monospace" font-size="18" fill="#ffb27b">
    <text x="520" y="116">PING innovationhub.jp (203.0.113.77) 56(84) bytes of data.</text>
    <text x="520" y="146" fill="#7fffd4">64 bytes</text>
    <text x="614" y="146"> from 203.0.113.77: icmp_seq=1 ttl=46 time=187.9 ms</text>
    <text x="520" y="176">--- innovationhub.jp ping statistics ---</text>
    <text x="520" y="206">1 packets transmitted, 1 received, 0% packet loss, time 1001ms</text>
    <text x="520" y="236">rtt min/avg/max/mdev = 187.9/187.9/187.9/0.0 ms</text>
  </g>
  <rect x="512" y="88" width="4" height="360" fill="rgba(255,255,255,0.08)"/>
</svg>
