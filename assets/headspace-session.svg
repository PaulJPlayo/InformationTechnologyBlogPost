<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">Headspace app dashboard mock interface</title>
  <desc id="desc">Stylized illustration of the Headspace mobile app dashboard highlighting recommendation cards and navigation tabs.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb27b"/>
      <stop offset="100%" stop-color="#ff6f1f"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff7f0"/>
      <stop offset="100%" stop-color="#f2f6ff"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="rgba(12,25,47,0.25)"/>
    </filter>
  </defs>
  <rect width="960" height="600" fill="#fff7f0"/>
  <rect x="200" y="20" width="560" height="560" rx="48" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="240" y="80" width="480" height="120" rx="24" fill="#fff" opacity="0.4"/>
  <rect x="240" y="240" width="480" height="280" rx="32" fill="#fff"/>
