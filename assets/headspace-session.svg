  <rect x="316" y="120" width="16" height="16" rx="8" fill="#ff9f50"/>
  <rect x="276" y="492" width="408" height="20" rx="10" fill="#d7ddff"/>
  <rect x="276" y="524" width="88" height="20" rx="10" fill="#2447d6"/>
  <g fill="#1f2b43" opacity="0.75">
